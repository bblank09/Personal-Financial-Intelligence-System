{% extends "base.html" %}

{% block content %}
<div class="flex h-screen overflow-hidden bg-transparent">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-100 flex flex-col hidden md:flex z-20 shadow-sm">
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <i class="fas fa-piggy-bank text-pocketwise-darkGreen text-2xl mr-3"></i>
            <span class="text-xl font-extrabold text-gray-800 tracking-tight font-heading">PocketWise</span>
        </div>
        <div class="flex-1 overflow-y-auto py-6">
            <nav class="space-y-1.5 px-3">
                <a href="/"
                    class="nav-link flex items-center px-3 py-3 text-sm font-medium rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
                    <i class="fas fa-border-all w-6 text-center mr-2"></i> Dashboard
                </a>
                <a href="/transactions"
                    class="nav-link active flex items-center px-3 py-3 text-sm font-semibold rounded-xl text-pocketwise-darkGreen bg-pocketwise-mint shadow-sm">
                    <i class="fas fa-exchange-alt w-6 text-center mr-2"></i> Transactions
                </a>
                <a href="/investments"
                    class="nav-link flex items-center px-3 py-3 text-sm font-medium rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
                    <i class="fas fa-chart-pie w-6 text-center mr-2"></i> Investments
                </a>
                <a href="/analytics"
                    class="nav-link flex items-center px-3 py-3 text-sm font-medium rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
                    <i class="fas fa-chart-line w-6 text-center mr-2"></i> Analytics
                </a>
            </nav>
        </div>
        <div class="p-4 border-t border-gray-100">
            <button onclick="logout()"
                class="flex items-center w-full px-3 py-3 text-sm font-medium rounded-xl text-red-600 hover:bg-red-50 transition-colors">
                <i class="fas fa-sign-out-alt w-6 text-center mr-2"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <!-- Topbar -->
        <header
            class="h-16 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-6 z-10">
            <div class="flex items-center md:hidden">
                <i class="fas fa-bars text-gray-500 text-xl cursor-pointer"></i>
                <span class="ml-4 text-xl font-extrabold text-gray-800 tracking-tight font-heading">PocketWise</span>
            </div>
            <div class="hidden md:flex flex-1">
                <h1 class="text-xl font-bold font-heading text-gray-800">Transactions</h1>
            </div>
            <div class="flex items-center space-x-5">
                <div class="flex items-center space-x-2">
                    <div
                        class="h-9 w-9 rounded-full bg-pocketwise-darkGreen text-white flex items-center justify-center font-bold shadow-sm">
                        <i class="fas fa-user text-sm"></i>
                    </div>
                    <span class="text-sm font-bold text-gray-700 hidden sm:block">{{ current_user.name if current_user
                        else 'User' }}</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8">
            <div class="max-w-6xl mx-auto space-y-8 animate-fade-in">

                <!-- Action Bar -->
                <div
                    class="flex justify-between items-center bg-white p-5 rounded-2xl soft-shadow border border-gray-50">
                    <div class="flex space-x-4">
                        <input type="month" id="monthFilter"
                            class="border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium text-gray-700 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen bg-gray-50 focus:bg-white transition-all shadow-sm cursor-pointer" />
                        <select id="categoryFilter"
                            class="border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium text-gray-700 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen bg-gray-50 focus:bg-white transition-all shadow-sm cursor-pointer">
                            <option value="">All Categories</option>
                        </select>
                        <select id="typeFilter"
                            class="border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium text-gray-700 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen bg-gray-50 focus:bg-white transition-all shadow-sm cursor-pointer">
                            <option value="">All Types</option>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <button onclick="openTransactionModal()"
                        class="bg-pocketwise-darkGreen text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-teal-800 focus:ring-2 focus:ring-offset-2 focus:ring-pocketwise-darkGreen transition-all shadow-md flex items-center">
                        <i class="fas fa-plus mr-2"></i> Add Transaction
                    </button>
                </div>

                <!-- Table -->
                <div class="bg-white rounded-2xl soft-shadow border border-gray-50 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-100">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col"
                                        class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider font-heading">
                                        Date</th>
                                    <th scope="col"
                                        class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider font-heading">
                                        Category</th>
                                    <th scope="col"
                                        class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider font-heading">
                                        Type</th>
                                    <th scope="col"
                                        class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider font-heading">
                                        Amount</th>
                                    <th scope="col"
                                        class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider font-heading">
                                        Actions</th>
                                </tr>
                            </thead>
                            <tbody id="transactionTableBody"
                                class="bg-white divide-y divide-gray-100 font-medium text-gray-700">
                                <!-- Data injected via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="txModal" class="fixed z-50 inset-0 overflow-y-auto hidden" aria-labelledby="modal-title" role="dialog"
        aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-900 bg-opacity-40 backdrop-blur-sm transition-opacity" aria-hidden="true"
                onclick="closeTransactionModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div
                class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-gray-100">
                <form id="txForm">
                    <input type="hidden" id="txId" value="">
                    <div class="bg-white px-6 pt-6 pb-6">
                        <h3 class="text-xl font-bold font-heading text-gray-900 mb-6" id="modal-title">Transaction
                        </h3>
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Type</label>
                                <select id="txType"
                                    class="block w-full border border-gray-200 rounded-xl shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen sm:text-sm bg-gray-50 focus:bg-white transition-all cursor-pointer">
                                    <option value="expense">Expense</option>
                                    <option value="income">Income</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Amount</label>
                                <input type="number" id="txAmount" required step="0.01" min="0"
                                    class="block w-full border border-gray-200 rounded-xl shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen sm:text-sm bg-gray-50 focus:bg-white transition-all"
                                    placeholder="0.00">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Category</label>
                                <input type="text" id="txCategory" required
                                    class="block w-full border border-gray-200 rounded-xl shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen sm:text-sm bg-gray-50 focus:bg-white transition-all"
                                    placeholder="Food, Transport, Salary...">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Date</label>
                                <input type="date" id="txDate" required
                                    class="block w-full border border-gray-200 rounded-xl shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen sm:text-sm bg-gray-50 focus:bg-white transition-all cursor-pointer">
                            </div>
                        </div>
                    </div>
                    <div
                        class="bg-gray-50 px-6 py-4 sm:flex sm:flex-row-reverse rounded-b-2xl border-t border-gray-100">
                        <button type="submit" id="saveTxBtn"
                            class="w-full inline-flex justify-center rounded-xl border border-transparent shadow-md px-5 py-2.5 bg-pocketwise-darkGreen text-base font-bold text-white hover:bg-teal-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pocketwise-darkGreen sm:ml-3 sm:w-auto sm:text-sm transition-all">
                            Save
                        </button>
                        <button type="button" onclick="closeTransactionModal()"
                            class="mt-3 w-full inline-flex justify-center rounded-xl border border-gray-200 shadow-sm px-5 py-2.5 bg-white text-base font-semibold text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition-colors">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="/static/js/transaction.js"></script>
{% endblock %}
