{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div
        class="max-w-4xl w-full flex bg-white rounded-3xl soft-shadow overflow-hidden animate-fade-in border border-gray-100">

        <!-- Image Side -->
        <div
            class="hidden md:flex md:w-1/2 bg-pocketwise-mint bg-opacity-40 p-12 flex-col justify-center items-center relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -top-24 -left-24 w-64 h-64 rounded-full bg-white opacity-40"></div>
            <div class="absolute -bottom-24 -right-24 w-64 h-64 rounded-full bg-pocketwise-darkGreen opacity-10"></div>

            <div class="text-center relative z-10">
                <div class="flex items-center justify-center mb-6">
                    <i class="fas fa-piggy-bank text-pocketwise-darkGreen text-5xl mr-3"></i>
                    <h1 class="text-4xl font-extrabold text-gray-800 tracking-tight font-heading">PocketWise</h1>
                </div>
                <h2 class="text-xl font-bold text-pocketwise-darkGreen mb-4 font-heading">Life begins and ends with
                    money</h2>
                <p class="text-gray-600 mb-8 font-medium">"If you buy unnecessary things, one day you will have to sell
                    necessary things"</p>
                <i class="fas fa-chart-pie text-9xl text-pocketwise-darkGreen opacity-20 drop-shadow-lg"></i>
            </div>
        </div>

        <!-- Form Side -->
        <div class="w-full md:w-1/2 p-10 lg:p-14 flex flex-col justify-center bg-white relative z-10">
            <div class="md:hidden flex items-center mb-8 justify-center">
                <i class="fas fa-piggy-bank text-pocketwise-darkGreen text-3xl mr-2"></i>
                <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight font-heading">PocketWise</h1>
            </div>
            <div>
                <h2 class="text-3xl font-extrabold text-gray-900 font-heading">Create Account</h2>
                <p class="mt-2 text-sm text-gray-600">
                    Already have an account?
                    <a href="/login"
                        class="font-semibold text-pocketwise-darkGreen hover:text-teal-800 transition-colors">
                        Sign in here
                    </a>
                </p>
            </div>

            <form id="registerForm" class="mt-8 space-y-5">
                <div class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-semibold text-gray-700 mb-1.5">Full Name</label>
                        <input id="name" name="name" type="text" required
                            class="appearance-none rounded-xl relative block w-full px-4 py-3.5 border border-gray-200 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen sm:text-sm transition-all shadow-sm bg-gray-50 focus:bg-white"
                            placeholder="John Doe">
                    </div>
                    <div>
                        <label for="email-address" class="block text-sm font-semibold text-gray-700 mb-1.5">Email
                            address</label>
                        <input id="email-address" name="email" type="email" required
                            class="appearance-none rounded-xl relative block w-full px-4 py-3.5 border border-gray-200 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen sm:text-sm transition-all shadow-sm bg-gray-50 focus:bg-white"
                            placeholder="student@university.edu">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                        <input id="password" name="password" type="password" required
                            class="appearance-none rounded-xl relative block w-full px-4 py-3.5 border border-gray-200 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen sm:text-sm transition-all shadow-sm bg-gray-50 focus:bg-white"
                            placeholder="••••••••">
                    </div>
                    <div>
                        <label for="confirm-password" class="block text-sm font-semibold text-gray-700 mb-1.5">Confirm
                            Password</label>
                        <input id="confirm-password" name="confirm-password" type="password" required
                            class="appearance-none rounded-xl relative block w-full px-4 py-3.5 border border-gray-200 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen sm:text-sm transition-all shadow-sm bg-gray-50 focus:bg-white"
                            placeholder="••••••••">
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-pocketwise-darkGreen hover:bg-teal-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pocketwise-darkGreen transition-all shadow-md mt-6">
                        Register
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('name').value;
        const email = document.getElementById('email-address').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm-password').value;

        if (password !== confirm) {
            showToast('Passwords do not match', 'error');
            return;
        }

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();

            if (res.ok) {
                showToast('Registration successful! Please login.');
                setTimeout(() => window.location.href = '/login', 1500);
            } else {
                showToast(data.error || 'Registration failed', 'error');
            }
        } catch (err) {
            showToast('An error occurred. Please try again.', 'error');
        }
    });
</script>
{% endblock %}
