{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div
        class="max-w-4xl w-full flex bg-white rounded-3xl soft-shadow overflow-hidden animate-fade-in border border-gray-100">

        <!-- Image Side -->
        <div
            class="hidden md:flex md:w-1/2 bg-pocketwise-mint bg-opacity-40 p-12 flex-col justify-center items-center relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -top-24 -left-24 w-64 h-64 rounded-full bg-white opacity-40"></div>
            <div class="absolute -bottom-24 -right-24 w-64 h-64 rounded-full bg-pocketwise-darkGreen opacity-10"></div>

            <div class="text-center relative z-10">
                <div class="flex items-center justify-center mb-6">
                    <i class="fas fa-piggy-bank text-pocketwise-darkGreen text-5xl mr-3"></i>
                    <h1 class="text-4xl font-extrabold text-gray-800 tracking-tight font-heading">PocketWise</h1>
                </div>
                <h2 class="text-xl font-bold text-pocketwise-darkGreen mb-4 font-heading">
                    Life begins and ends with money</h2>
                <p class="text-gray-600 mb-8 font-medium">"If you buy unnecessary things, one day you will have to sell
                    necessary things"</p>
                <!-- Using FontAwesome icon as illustration placeholder -->
                <i class="fas fa-wallet text-9xl text-pocketwise-darkGreen opacity-20 drop-shadow-lg"></i>
            </div>
        </div>

        <!-- Form Side -->
        <div class="w-full md:w-1/2 p-10 lg:p-16 flex flex-col justify-center bg-white relative z-10">
            <div class="md:hidden flex items-center mb-10 justify-center">
                <i class="fas fa-piggy-bank text-pocketwise-darkGreen text-3xl mr-2"></i>
                <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight font-heading">PocketWise</h1>
            </div>
            <div>
                <h2 class="text-3xl font-extrabold text-gray-900 font-heading">Sign In</h2>
                <p class="mt-2 text-sm text-gray-600">
                    Or
                    <a href="/register"
                        class="font-semibold text-pocketwise-darkGreen hover:text-teal-800 transition-colors">
                        register a new user
                    </a>
                </p>
            </div>

            <form id="loginForm" class="mt-8 space-y-6">
                <div class="space-y-5">
                    <div>
                        <label for="email-address" class="block text-sm font-semibold text-gray-700 mb-1.5">Email
                            address</label>
                        <input id="email-address" name="email" type="email" autocomplete="email" required
                            class="appearance-none rounded-xl relative block w-full px-4 py-3.5 border border-gray-200 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen sm:text-sm transition-all shadow-sm bg-gray-50 focus:bg-white"
                            placeholder="xxx@email.com">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required
                            class="appearance-none rounded-xl relative block w-full px-4 py-3.5 border border-gray-200 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-pocketwise-mint focus:border-pocketwise-darkGreen sm:text-sm transition-all shadow-sm bg-gray-50 focus:bg-white"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox"
                            class="h-4 w-4 text-pocketwise-darkGreen focus:ring-pocketwise-mint border-gray-300 rounded cursor-pointer">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-700 cursor-pointer font-medium">
                            Remember me
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="#"
                            class="font-semibold text-pocketwise-darkGreen hover:text-teal-800 transition-colors">
                            Forgot password?
                        </a>
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-pocketwise-darkGreen hover:bg-teal-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pocketwise-darkGreen transition-all shadow-md mt-2">
                        Sign In
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email-address').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (res.ok) {
                showToast('Login successful!');
                setTimeout(() => window.location.href = '/', 1000); // Redirect to dashboard
            } else {
                showToast(data.error || 'Login failed', 'error');
            }
        } catch (err) {
            showToast('An error occurred. Please try again.', 'error');
        }
    });
</script>
{% endblock %}
